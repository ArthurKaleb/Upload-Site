<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive + Notificações</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

.app{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{font-size:22px}

.actionsTop{
  display:flex;
  gap:10px;
}

.btn{
  width:45px;height:45px;
  border-radius:50%;
  border:1px solid #333;
  background:#111;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

.btn:hover{background:#fff;color:#000}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  animation:fade .2s ease-in;
}

@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* TOAST NOTIFICAÇÃO */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:12px 16px;
  border-radius:10px;
  font-size:13px;
  display:none;
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}

.preview{
  height:140px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  overflow:hidden;
}

img,video{
  width:100%;
  height:100%;
  object-fit:cover;
}

button,a{
  border:none;
  padding:7px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
}

.download{background:#fff;color:#000;text-decoration:none}
.delete{background:#222;color:red}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive Inteligente</h1>

  <div class="actionsTop">

    <!-- NOTIFICAÇÃO TOGGLE -->
    <button class="btn" id="notifBtn">🔔</button>

    <!-- UPLOAD -->
    <button class="btn" id="add">+</button>
    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const fileInput=document.getElementById("file");
const toast=document.getElementById("toast");
const notifBtn=document.getElementById("notifBtn");

document.getElementById("add").onclick=()=>fileInput.click();

/* =====================
   NOTIFICAÇÃO STATE
===================== */
let notificationsEnabled =
localStorage.getItem("notif") === "true";

updateNotifUI();

notifBtn.onclick=()=>{
  notificationsEnabled = !notificationsEnabled;
  localStorage.setItem("notif", notificationsEnabled);
  updateNotifUI();
  subscribeNotifications();
};

function updateNotifUI(){
  notifBtn.style.background = notificationsEnabled ? "#fff" : "#111";
  notifBtn.style.color = notificationsEnabled ? "#000" : "#fff";
}

/* =====================
   UPLOAD
===================== */
fileInput.onchange=async(e)=>{
  for(let file of e.target.files){

    const path=`${Date.now()}_${file.name}`;

    await supabase.storage
    .from(BUCKET)
    .upload(path,file);

    const {data}=supabase.storage
    .from(BUCKET)
    .getPublicUrl(path);

    await supabase.from(TABLE).insert({
      nome:file.name,
      tipo:file.type,
      url:data.publicUrl,
      caminho:path,
      criado_em:new Date()
    });

    // 🔥 DISPARA NOTIFICAÇÃO GLOBAL
    await supabase.from("notifications").insert({
      message:`Novo arquivo enviado: ${file.name}`
    });
  }

  load();
};

/* =====================
   LOAD FILES
===================== */
async function load(){

  const {data}=await supabase
  .from(TABLE)
  .select("*")
  .order("criado_em",{ascending:false});

  grid.innerHTML="";

  data.forEach(f=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="preview">
        ${f.tipo?.startsWith("image/")
          ? `<img src="${f.url}">`
          : f.tipo?.startsWith("video/")
          ? `<video src="${f.url}" controls></video>`
          : "📄"}
      </div>

      <div>${f.nome}</div>

      <a class="download" href="${f.url}" download>Baixar</a>
      <button class="delete" onclick="del('${f.id}','${f.caminho}')">Excluir</button>
    `;

    grid.appendChild(div);
  });
}

/* =====================
   DELETE
===================== */
window.del=async(id,path)=>{

  await supabase.storage.from(BUCKET).remove([path]);
  await supabase.from(TABLE).delete().eq("id",id);

  load();
};

/* =====================
   NOTIFICAÇÕES REALTIME
===================== */
function subscribeNotifications(){

  supabase.channel('notif')
  .on(
    'postgres_changes',
    {
      event:'INSERT',
      schema:'public',
      table:'notifications'
    },
    (payload)=>{

      if(!notificationsEnabled) return;

      showToast(payload.new.message);
    }
  )
  .subscribe();
}

function showToast(msg){
  toast.innerText = msg;
  toast.style.display="block";

  setTimeout(()=>{
    toast.style.display="none";
  },3000);
}

subscribeNotifications();
load();
</script>

</body>
</html>
