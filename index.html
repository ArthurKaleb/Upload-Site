<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive com Delay</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

.app{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{font-size:22px}

.actionsTop{
  display:flex;
  gap:10px;
}

.btn{
  width:45px;height:45px;
  border-radius:50%;
  border:1px solid #333;
  background:#111;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

.btn:hover{background:#fff;color:#000}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

/* 🔥 ANIMAÇÃO COM DELAY */
.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  opacity:0;
  transform:translateY(10px);
  animation:fadeIn .35s ease forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.preview{
  height:140px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  overflow:hidden;
}

img,video{
  width:100%;
  height:100%;
  object-fit:cover;
}

button,a{
  border:none;
  padding:7px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
}

.download{background:#fff;color:#000;text-decoration:none}
.delete{background:#222;color:red}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:10px 14px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive com Delay</h1>

  <div class="actionsTop">
    <button class="btn" id="notif">🔔</button>
    <button class="btn" id="add">+</button>
    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const fileInput=document.getElementById("file");
const toast=document.getElementById("toast");

document.getElementById("add").onclick=()=>fileInput.click();

/* ======================
   UPLOAD
====================== */
fileInput.onchange=async(e)=>{

  for(let file of e.target.files){

    const path=`${Date.now()}_${file.name}`;

    await supabase.storage
    .from(BUCKET)
    .upload(path,file);

    const {data}=supabase.storage
    .from(BUCKET)
    .getPublicUrl(path);

    await supabase.from(TABLE).insert({
      nome:file.name,
      tipo:file.type,
      url:data.publicUrl,
      caminho:path,
      criado_em:new Date()
    });
  }

  load();
};

/* ======================
   LOAD COM DELAY
====================== */
async function load(){

  const {data}=await supabase
  .from(TABLE)
  .select("*")
  .order("criado_em",{ascending:false});

  grid.innerHTML="";

  if(!data) return;

  data.forEach((file,index)=>{

    const div=document.createElement("div");
    div.className="card";

    // 🔥 DELAY CRESCENTE
    div.style.animationDelay = `${index * 80}ms`;

    div.innerHTML=`
      <div class="preview">
        ${file.tipo?.startsWith("image/")
          ? `<img src="${file.url}">`
          : file.tipo?.startsWith("video/")
          ? `<video src="${file.url}" controls></video>`
          : "📄"}
      </div>

      <div>${file.nome}</div>

      <a class="download" href="${file.url}" download>Baixar</a>
      <button class="delete" onclick="del('${file.id}','${file.caminho}')">Excluir</button>
    `;

    grid.appendChild(div);
  });
}

/* ======================
   DELETE
====================== */
window.del=async(id,path)=>{

  await supabase.storage.from(BUCKET).remove([path]);
  await supabase.from(TABLE).delete().eq("id",id);

  load();
};

/* ======================
   NOTIFICAÇÃO SIMPLES
====================== */
function toastMsg(msg){
  toast.innerText=msg;
  toast.style.display="block";

  setTimeout(()=>toast.style.display="none",2000);
}

load();
</script>

</body>
</html>
