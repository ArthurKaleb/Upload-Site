<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arquivos na Nuvem</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #050505;
      color: white;
    }

    .app {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 24px;
    }

    .btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #111;
      color: white;
      font-size: 28px;
      border: 1px solid #333;
      cursor: pointer;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    input {
      display: none;
    }

    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: #111;
      padding: 12px;
      border-radius: 12px;
    }

    .preview {
      height: 140px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      overflow: hidden;
    }

    img, video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-size: 13px;
      margin: 8px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 5px;
    }

    .actions a,
    .actions button {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }

    .download {
      background: white;
      color: black;
      text-decoration: none;
    }

    .delete {
      background: #222;
      color: red;
    }
  </style>
</head>

<body>
  <div class="app">

    <header>
      <h1>Arquivos na Nuvem</h1>
      <button class="btn" id="btn">+</button>
      <input type="file" id="file" multiple />
    </header>

    <div class="grid" id="grid"></div>

  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://uosubywnpexfdykxrsda.supabase.co";
    const SUPABASE_KEY = "sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ";

    const BUCKET = "arquivos";
    const TABLE = "arquivos";

    const LIMIT = 10;

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const btn = document.getElementById("btn");
    const fileInput = document.getElementById("file");
    const grid = document.getElementById("grid");

    btn.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
      const files = e.target.files;

      for (let file of files) {

        const path = `${Date.now()}_${file.name}`;

        // 1. upload storage
        const { error: upErr } = await supabase.storage
          .from(BUCKET)
          .upload(path, file);

        if (upErr) continue;

        // 2. url
        const { data } = supabase.storage
          .from(BUCKET)
          .getPublicUrl(path);

        // 3. insert db
        await supabase.from(TABLE).insert({
          nome: file.name,
          tipo: file.type,
          url: data.publicUrl,
          caminho: path,
          tamanho: file.size,
          criado_em: new Date()
        });

        // 4. LIMITE DE 10 ARQUIVOS
        await enforceLimit();
      }

      loadFiles();
    };

    // 🔥 FUNÇÃO NOVA: limita 10 arquivos
    async function enforceLimit() {

      const { data } = await supabase
        .from(TABLE)
        .select("*")
        .order("criado_em", { ascending: true }); // mais antigos primeiro

      if (!data || data.length <= LIMIT) return;

      const excess = data.length - LIMIT;

      const toDelete = data.slice(0, excess);

      for (let file of toDelete) {

        await supabase.storage
          .from(BUCKET)
          .remove([file.caminho]);

        await supabase
          .from(TABLE)
          .delete()
          .eq("id", file.id);
      }
    }

    async function loadFiles() {

      const { data } = await supabase
        .from(TABLE)
        .select("*")
        .order("criado_em", { ascending: false });

      grid.innerHTML = "";

      if (!data || data.length === 0) return;

      data.forEach(file => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="preview">
            ${file.tipo?.startsWith("image/")
              ? `<img src="${file.url}">`
              : file.tipo?.startsWith("video/")
              ? `<video src="${file.url}" controls></video>`
              : "📄"}
          </div>

          <div class="name">${file.nome}</div>

          <div class="actions">
            <a class="download" href="${file.url}" download="${file.nome}">
              Baixar
            </a>

            <button class="delete" onclick="del('${file.id}','${file.caminho}')">
              Excluir
            </button>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    window.del = async (id, path) => {

      await supabase.storage.from(BUCKET).remove([path]);
      await supabase.from(TABLE).delete().eq("id", id);

      loadFiles();
    };

    loadFiles();
  </script>

</body>
</html>
