<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive Completo</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

.app{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{font-size:22px}

.btn{
  width:45px;height:45px;
  border-radius:50%;
  border:1px solid #333;
  background:#111;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

.btn:hover{background:#fff;color:#000}

/* MENU DO + */
.menu{
  position:absolute;
  top:70px;
  right:30px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

.menu button{
  background:none;
  border:none;
  color:#fff;
  padding:12px;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#222;
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111;
  padding:12px;
  border-radius:12px;
  opacity:0;
  transform:translateY(10px);
  animation:fade .3s ease forwards;
}

@keyframes fade{
  to{opacity:1;transform:translateY(0)}
}

.preview{
  height:140px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  overflow:hidden;
}

img,video{
  width:100%;
  height:100%;
  object-fit:cover;
}

textarea{
  width:100%;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:8px;
  padding:8px;
  resize:none;
}

.actions{
  display:flex;
  gap:5px;
  margin-top:6px;
}

button,a{
  border:none;
  padding:7px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
}

.download{background:#fff;color:#000;text-decoration:none}
.delete{background:#222;color:red}
.copy{background:#fff;color:#000}
.save{background:#222;color:#fff}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Drive Completo</h1>

  <div style="position:relative">
    <button class="btn" id="plus">+</button>

    <div class="menu" id="menu">
      <button onclick="selectFile()">📁 Arquivo</button>
      <button onclick="addText()">📝 Texto</button>
    </div>

    <input type="file" id="file" multiple style="display:none">
  </div>
</header>

<div class="grid" id="grid"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://uosubywnpexfdykxrsda.supabase.co",
"sb_publishable_c7Gcs7TYe8elQ-lZ50cjUA_EERGehuQ"
);

const BUCKET="arquivos";
const TABLE="arquivos";

const grid=document.getElementById("grid");
const fileInput=document.getElementById("file");

const menu=document.getElementById("menu");
const plus=document.getElementById("plus");

/* MENU TOGGLE */
plus.onclick=()=>{
  menu.style.display = menu.style.display==="flex" ? "none":"flex";
};

document.addEventListener("click",(e)=>{
  if(!menu.contains(e.target) && e.target!==plus){
    menu.style.display="none";
  }
});

/* ======================
   ARQUIVOS
====================== */
window.selectFile=()=>{
  fileInput.click();
};

fileInput.onchange=async(e)=>{

  for(let file of e.target.files){

    const path=`${Date.now()}_${file.name}`;

    await supabase.storage
    .from(BUCKET)
    .upload(path,file);

    const {data}=supabase.storage
    .from(BUCKET)
    .getPublicUrl(path);

    await supabase.from(TABLE).insert({
      nome:file.name,
      tipo:file.type,
      url:data.publicUrl,
      caminho:path,
      tipo_item:"file",
      criado_em:new Date()
    });
  }

  load();
};

/* ======================
   TEXTO
====================== */
window.addText=async()=>{

  const text=prompt("Escreva seu texto:");

  if(!text) return;

  await supabase.from(TABLE).insert({
    nome:"Texto",
    tipo_item:"text",
    content:text,
    criado_em:new Date()
  });

  load();
};

/* ======================
   LOAD
====================== */
async function load(){

  const {data}=await supabase
  .from(TABLE)
  .select("*")
  .order("criado_em",{ascending:false});

  grid.innerHTML="";

  data.forEach((item,i)=>{

    const div=document.createElement("div");
    div.className="card";
    div.style.animationDelay=`${i*60}ms`;

    /* FILE */
    if(item.tipo_item==="file"){

      div.innerHTML=`
        <div class="preview">
          ${item.tipo?.startsWith("image/")
            ? `<img src="${item.url}">`
            : item.tipo?.startsWith("video/")
            ? `<video src="${item.url}" controls></video>`
            : "📄"}
        </div>

        <div>${item.nome}</div>

        <a class="download" href="${item.url}" download>Baixar</a>
      `;
    }

    /* TEXT */
    else{

      div.innerHTML=`
        <textarea id="t-${item.id}">${item.content}</textarea>

        <div class="actions">
          <button class="copy" onclick="copyText('${item.id}')">Copiar</button>
          <button class="save" onclick="saveText('${item.id}')">Salvar</button>
          <button class="delete" onclick="del('${item.id}')">Excluir</button>
        </div>
      `;
    }

    grid.appendChild(div);
  });
}

/* ======================
   TEXT ACTIONS
====================== */
window.copyText=(id)=>{
  const t=document.getElementById("t-"+id);
  navigator.clipboard.writeText(t.value);
  alert("Copiado!");
};

window.saveText=async(id)=>{
  const t=document.getElementById("t-"+id);

  await supabase
  .from(TABLE)
  .update({content:t.value})
  .eq("id",id);
};

window.del=async(id,path)=>{

  if(path){
    await supabase.storage.from(BUCKET).remove([path]);
  }

  await supabase.from(TABLE).delete().eq("id",id);

  load();
};

load();
</script>

</body>
</html>
